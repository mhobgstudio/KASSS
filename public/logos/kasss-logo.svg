<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Background Circle -->
  <defs>
    <linearGradient id="orbitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="planetGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FBBF24;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="planetGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Orbital Path -->
  <ellipse cx="280" cy="180" rx="120" ry="80" stroke="url(#orbitGrad)" stroke-width="3" fill="none" transform="rotate(-20 280 180)"/>

  <!-- K Letter -->
  <text x="80" y="220" font-family="Arial Black, sans-serif" font-size="140" font-weight="900" fill="#1a1a2e">K</text>

  <!-- ASSS Text -->
  <text x="165" y="210" font-family="Arial, sans-serif" font-size="55" font-weight="600" fill="#374151" letter-spacing="2">ASSS</text>

  <!-- Saturn-like Planet with Rings -->
  <g transform="translate(300, 100)">
    <!-- Planet Body -->
    <circle cx="0" cy="0" r="25" fill="url(#planetGrad1)"/>
    <!-- Ring -->
    <ellipse cx="0" cy="0" rx="40" ry="10" stroke="#FBBF24" stroke-width="2" fill="none"/>
  </g>

  <!-- Small Stars -->
  <circle cx="320" cy="70" r="3" fill="#9CA3AF"/>
  <circle cx="350" cy="90" r="2" fill="#9CA3AF"/>
  <circle cx="280" cy="60" r="2" fill="#9CA3AF"/>
  <circle cx="360" cy="120" r="1.5" fill="#9CA3AF"/>

  <!-- Small Planet (like Neptune/Uranus) -->
  <g transform="translate(310, 240)">
    <circle cx="0" cy="0" r="30" fill="url(#planetGrad2)"/>
    <!-- Planet texture lines -->
    <path d="M-25 5 Q0 -5 25 5" stroke="#A78BFA" stroke-width="2" fill="none"/>
    <path d="M-20 15 Q0 10 20 15" stroke="#A78BFA" stroke-width="1.5" fill="none"/>
  </g>

  <!-- Tagline -->
  <text x="200" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#4B5563" letter-spacing="3">KNUST ASTRONOMY AND SPACE SCIENCE SOCIETY</text>
</svg>
